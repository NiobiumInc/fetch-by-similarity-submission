name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity-local:
    # Baseline sanity check — never touches the proprietary compiler, only
    # the open-source niobium-client + fhetch_driver simulator. Builds the
    # vendored niobium-client submodule + this workload, then runs the full
    # 10-stage FHE pipeline (TOY size) twice with the same seed: run 1
    # RECORDS the trace via plain OpenFHE, run 2 REPLAYS it through the
    # in-tree, open-source fhetch_driver simulator ("--target local", the
    # documented debugging/correctness path — see NIOBIUM_INTEGRATION.md).
    # Compiler-backed replay against the real SDK is covered separately by
    # compiler-tests.yml, also on gcp-ephemeral.
    #
    # Runs on gcp-ephemeral (n2-highmem-8, 64GB) rather than ubuntu-latest
    # (7GB): even at TOY size this workload's keys/database are multi-GB
    # (see NIOBIUM_INTEGRATION.md — TOY intentionally uses the full ring
    # dimension so traces stay parameter-compatible across sizes), and the
    # record+replay round trip was getting OOM-killed on the standard
    # GitHub-hosted runner. NOTE: this moves the fork-PR approval gate onto
    # this check too — a self-hosted job in a workflow means the whole run
    # needs maintainer approval for first-time/outside contributors before
    # anything in it executes (see compiler-tests.yml for the same note).
    name: Sanity (TOY, local replay)
    runs-on: [self-hosted, Linux, X64, gcp-ephemeral, n2-highmem-8]

    env:
      CC: ccache gcc
      CXX: ccache g++
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build tooling
        run: |
          sudo apt-get update -qq
          # python3-numpy via apt: this runner has no pip, and numpy isn't
          # actually preinstalled on the image (verified — don't assume it is).
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache ninja-build python3-numpy
          python3 -c "import numpy" || { echo "::error::numpy still not importable after apt install"; exit 1; }
          ccache --version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: gcp-ephemeral-ccache-release-${{ hashFiles('submission/niobium-client/Makefile', 'submission/CMakeLists.txt', 'submission/src/**') }}
          restore-keys: |
            gcp-ephemeral-ccache-release-

      - name: Prime ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --max-size=2G
          ccache --zero-stats

      # Mirrors harness/utils.py's build_submission(): builds niobium-client
      # (vendored OpenFHE + libnbfhetch + client), the fhetch_driver replay
      # helper, then this workload's binaries against that OpenFHE install.
      # Done as an explicit step (rather than letting run_submission.py do it
      # lazily) so build output is easy to scan on a break; the harness's own
      # build_submission() call below becomes a fast no-op re-run of `make`.
      - name: Build niobium-client + fhetch_driver + submission
        run: |
          OPENFHE_PREFIX="$GITHUB_WORKSPACE/submission/niobium-client/vendor/lib/openfhe"
          make -C submission/niobium-client release
          make -C submission/niobium-client/vendor/niobium-fhetch config-fhetch-release \
            OPENFHE_INSTALL_DIR="$OPENFHE_PREFIX" EXTERNAL_OPENFHE=1
          cmake --build submission/niobium-client/vendor/niobium-fhetch/build \
            -j"$(nproc)" --target fhetch_driver
          scripts/build_task.sh ./submission "$OPENFHE_PREFIX"

      - name: Run submission — record (TOY, --target local)
        run: python3 harness/run_submission.py 0 --seed 12345 --target local

      - name: Run submission — replay via fhetch_driver (TOY, new keys, cache hit)
        run: python3 harness/run_submission.py 0 --seed 12345 --target local

      - name: ccache stats
        if: always()
        run: ccache --show-stats || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-local-logs-${{ github.run_attempt }}
          path: |
            submission/build/CMakeFiles/CMakeOutput.log
            submission/build/CMakeFiles/CMakeError.log
            submission/niobium-client/build/CMakeFiles/CMakeOutput.log
            submission/niobium-client/build/CMakeFiles/CMakeError.log
            io/toy/
            datasets/toy/
          if-no-files-found: ignore
          retention-days: 7
