name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity-local:
    # Baseline sanity check — never touches the proprietary compiler, only
    # the open-source niobium-client + fhetch_driver simulator. Builds the
    # vendored niobium-client submodule + this workload, then runs the full
    # 10-stage FHE pipeline (TOY size) once with --target local: since
    # "Enable hollow-mode recording + always-replay in FBS server compute"
    # (fetch-by-similarity-submission#11), server_encrypted_compute always
    # calls replay() unconditionally — a cache miss records the trace in
    # hollow mode (fast, no real FHE math) and a cache hit skips recording
    # entirely, but either way replay() runs right after and is what
    # produces the correct, verified result. One invocation now exercises
    # both the (hollow) record path and the fhetch_driver replay path; a
    # second invocation would just repeat the same replay redundantly.
    # Compiler-backed replay against the real SDK is covered separately by
    # compiler-tests.yml, also on gcp-ephemeral.
    #
    # Runs on gcp-ephemeral n2-highmem-48 (384GB). Measured locally
    # (/usr/bin/time -v, uncapped): fhetch_driver's replay of this TOY-size
    # trace (2.19M instructions, ring dim 65536) peaks at ~311GB RSS and
    # takes ~15 minutes — confirmed OOM-killed (exit 137) on 32GB
    # (gcp-ephemeral default), 64GB (n2-highmem-8), and even the 7GB
    # GitHub-hosted ubuntu-latest runner this job originally used. This is
    # a known upstream memory issue in fhetch_driver's replay path, not
    # something fixable via CI config — n2-highmem-48 is a stopgap so the
    # check can pass at all while that gets fixed; reassess once it is.
    # NOTE: this moves the fork-PR approval gate onto this check too — a
    # self-hosted job in a workflow means the whole run needs maintainer
    # approval for first-time/outside contributors before anything in it
    # executes (see compiler-tests.yml for the same note).
    name: Sanity (TOY, local replay)
    runs-on: [self-hosted, gcp-ephemeral, n2-highmem-48]

    env:
      CC: ccache gcc
      CXX: ccache g++
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build tooling
        run: |
          sudo apt-get update -qq
          # python3-numpy via apt: this runner has no pip, and numpy isn't
          # actually preinstalled on the image (verified — don't assume it is).
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache ninja-build python3-numpy
          python3 -c "import numpy" || { echo "::error::numpy still not importable after apt install"; exit 1; }
          ccache --version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: gcp-ephemeral-ccache-release-${{ hashFiles('submission/niobium-client/Makefile', 'submission/CMakeLists.txt', 'submission/src/**') }}
          restore-keys: |
            gcp-ephemeral-ccache-release-

      - name: Prime ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --max-size=2G
          ccache --zero-stats

      # Mirrors harness/utils.py's build_submission(): builds niobium-client
      # (vendored OpenFHE + libnbfhetch + client), the fhetch_driver replay
      # helper, then this workload's binaries against that OpenFHE install.
      # Done as an explicit step (rather than letting run_submission.py do it
      # lazily) so build output is easy to scan on a break; the harness's own
      # build_submission() call below becomes a fast no-op re-run of `make`.
      - name: Build niobium-client + fhetch_driver + submission
        run: |
          OPENFHE_PREFIX="$GITHUB_WORKSPACE/submission/niobium-client/vendor/lib/openfhe"
          make -C submission/niobium-client release
          make -C submission/niobium-client/vendor/niobium-fhetch config-fhetch-release \
            OPENFHE_INSTALL_DIR="$OPENFHE_PREFIX" EXTERNAL_OPENFHE=1
          cmake --build submission/niobium-client/vendor/niobium-fhetch/build \
            -j"$(nproc)" --target fhetch_driver
          scripts/build_task.sh ./submission "$OPENFHE_PREFIX"

      # DIAGNOSTIC: fhetch_driver has been dying with exit 137 (SIGKILL)
      # seconds after "Recording started", with zero progress output —
      # sample memory every second in the background so we can see whether
      # it's actually an OOM kill or a hang with memory flat.
      - name: Start memory monitor (background)
        run: |
          ( while true; do date -u +"%H:%M:%S"; free -h; echo "---"; sleep 1; done > "$RUNNER_TEMP/memlog.txt" ) &
          echo $! > "$RUNNER_TEMP/memmon.pid"

      - name: Run submission — record (hollow) + replay via fhetch_driver (TOY, --target local)
        run: python3 harness/run_submission.py 0 --seed 12345 --target local

      - name: Stop memory monitor and show log
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/memmon.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/memmon.pid")" 2>/dev/null || true
          fi
          tail -200 "$RUNNER_TEMP/memlog.txt" || true

      - name: ccache stats
        if: always()
        run: ccache --show-stats || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-local-logs-${{ github.run_attempt }}
          path: |
            submission/build/CMakeFiles/CMakeOutput.log
            submission/build/CMakeFiles/CMakeError.log
            submission/niobium-client/build/CMakeFiles/CMakeOutput.log
            submission/niobium-client/build/CMakeFiles/CMakeError.log
            io/toy/
            datasets/toy/
          if-no-files-found: ignore
          retention-days: 7
