# .github/workflows/compiler-tests.yml
#
# Public-repo compiler sanity check. Runs on the ephemeral GCP self-hosted
# runner group (gcp-ephemeral) so the on-prem Niobium cluster is never
# exposed to public-repo PRs. Mirrors niobium-client's own
# compiler-tests.yml; see https://github.com/NiobiumInc/gcp-github-runners
# (workflow-snippets/README.md) for onboarding + operational details, and
# this repo's NIOBIUM_INTEGRATION.md for the record/replay integration.
#
# ===========================================================================
# HARD REQUIREMENT: NO nbcc / compiler output in the public Actions log.
# Public repos => Actions logs AND artifacts are world-readable, with no
# per-job privacy toggle. The transport server and the replay run both send
# stdout+stderr to /dev/null; this workflow surfaces ONLY the exit status
# (PASS / FAIL). Do NOT: echo compiler output, `set -x` around it, upload
# trace/io/dataset artifacts, or print the SDK version. (RECORD is exempt —
# niobium::compiler().replay() is only invoked on a cache HIT, so the record
# run never touches the compiler; its output is plain OpenFHE and safe.)
# ===========================================================================
#
# Never use pull_request_target with a checkout of the PR head.

name: compiler-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# Least privilege: the job only needs to read the repo for checkout.
permissions:
  contents: read

concurrency:
  group: compiler-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compiler-tests:
    name: Compiler tests (self-hosted, GCP)
    # This is now the ONLY sanity check for FBS (the former ci.yml's
    # --target local / fhetch_driver check was removed — local fhetch_driver
    # replay is unsupported for FBS; it was also the source of a ~311GB RSS
    # upstream memory bug, unrelated to this target).
    #
    # TEMPORARY: using --target FHE_SIM instead of FUNC_SIM_HW. Confirmed
    # FUNC_SIM_HW is broken specifically in SDK/NIOBIUM_DIST_BUILD builds —
    # replay_iss.cpp silently substitutes the FHE_SIM/OpenFHE executor with
    # Montgomery forced off, while the rest of the pipeline still assumes HW
    # mode is on (spec's montgomery_enabled: true), corrupting ciphertext
    # state and failing CKKS decode ("approximation error too high"). FHE_SIM
    # doesn't hit this mismatch and is confirmed passing via the SDK. Revert
    # to FUNC_SIM_HW once niobium-compiler fixes the DIST_BUILD executor path.
    #
    # Downsized from n2-highmem-48 (384GB, sized for fhetch_driver's local
    # replay, now removed) to n2-highmem-16 (128GB) — measured peak with
    # FHE_SIM is ~57-59GB, so this keeps ~2x headroom.
    runs-on: [self-hosted, gcp-ephemeral, n2-highmem-16]
    timeout-minutes: 60   # OpenFHE cold-build ~15 min + FBS record/replay round trip
    env:
      SDK: /mnt/niobium-sdk/sdk   # mounted RO at boot by runner-startup.sh
      PORT: "9443"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Verify SDK is mounted (no version printed)
        run: |
          test -x "$SDK/bin/nbcc_fhetch_replay" || { echo "::error::SDK not mounted"; exit 1; }

      - name: Install build tooling
        run: |
          sudo apt-get update -qq
          # python3-numpy via apt: this runner has no pip, and numpy isn't
          # actually preinstalled on the image (verified — don't assume it is).
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build python3-numpy
          python3 -c "import numpy" || { echo "::error::numpy still not importable after apt install"; exit 1; }

      - name: Build niobium-client + fhetch_driver + submission (release)
        # Public C++/OpenFHE output — OK to show; useful for diagnosing build breaks.
        run: |
          OPENFHE_PREFIX="$GITHUB_WORKSPACE/submission/niobium-client/vendor/lib/openfhe"
          make -C submission/niobium-client release
          make -C submission/niobium-client/vendor/niobium-fhetch config-fhetch-release \
            OPENFHE_INSTALL_DIR="$OPENFHE_PREFIX" EXTERNAL_OPENFHE=1
          cmake --build submission/niobium-client/vendor/niobium-fhetch/build \
            -j"$(nproc)" --target fhetch_driver
          scripts/build_task.sh ./submission "$OPENFHE_PREFIX"

      - name: Map the SDK into the layout the transport server expects
        run: |
          # The server daemon --execs $NIOBIUM_COMPILER_ROOT/build/nbcc_fhetch_replay.
          # The SDK ships bin/ + lib/; bridge with a shim of symlinks (same
          # pattern as niobium-client's own compiler-tests.yml).
          SHIM="$RUNNER_TEMP/nbcc-root"
          mkdir -p "$SHIM/build"
          ln -sf "$SDK"/bin/* "$SHIM/build/"
          ln -sf "$SDK"/lib/* "$SHIM/build/"
          test -x "$SHIM/build/nbcc_fhetch_replay" || { echo "::error::SDK missing nbcc_fhetch_replay"; exit 1; }
          echo "NIOBIUM_COMPILER_ROOT=$SHIM" >> "$GITHUB_ENV"
          # The compiler (run server-side by the transport) needs the SDK device
          # specs for a non-trivial --target like FHE_SIM; without this it aborts
          # with "Cannot find devices directory".
          echo "NIOBIUM_SPEC_DIR=$SDK/share/niobium/devices" >> "$GITHUB_ENV"

      # Since "Enable hollow-mode recording + always-replay in FBS server
      # compute" (fetch-by-similarity-submission#11), server_encrypted_compute
      # calls niobium::compiler().replay() UNCONDITIONALLY — a cache miss
      # records the trace in hollow mode first, but either way replay() runs
      # right after. For a non-local --target that means EVERY invocation
      # dispatches over the transport, so the server must already be up
      # before the first (and only) harness call, not after it.
      - name: Start the transport server (background, output suppressed)
        run: |
          set +x
          CLIENT_ROOT="$GITHUB_WORKSPACE/submission/niobium-client"
          SERVER_BIN="$CLIENT_ROOT/build/src/fhetch_transport/nbcc_fhetch_replay_server"
          COMPILER_BIN="$NIOBIUM_COMPILER_ROOT/build/nbcc_fhetch_replay"
          test -x "$SERVER_BIN" || { echo "::error::server binary not built: $SERVER_BIN"; exit 1; }

          ENV_FILE="$CLIENT_ROOT/build/niobium_client.env"
          [ -f "$ENV_FILE" ] && . "$ENV_FILE"
          : "${OPENFHE_LIB:=$CLIENT_ROOT/vendor/lib/openfhe/lib}"

          # PATH must include the compiler root's build/ dir: the compiler's
          # "secondary replay" step execs a small `replay` helper binary by
          # bare name, not by full path. The SDK ships it at bin/replay (the
          # shim symlinks it into build/ alongside nbcc_fhetch_replay), but
          # without PATH the server can't find it and replay fails with
          # "Could not find replay executable in PATH".
          LD_LIBRARY_PATH="$OPENFHE_LIB:$NIOBIUM_COMPILER_ROOT/build" \
            PATH="$NIOBIUM_COMPILER_ROOT/build:$PATH" \
            "$SERVER_BIN" --port "$PORT" --bind 127.0.0.1 --exec "$COMPILER_BIN" \
            >/dev/null 2>&1 &
          echo $! > "$RUNNER_TEMP/fhetch_server.pid"

          # Wait for /healthz — no busy-wait, poll on a short sleep.
          ready=0
          for i in $(seq 1 50); do
            if curl -sf "http://127.0.0.1:$PORT/healthz" >/dev/null 2>&1; then
              ready=1
              break
            fi
            kill -0 "$(cat "$RUNNER_TEMP/fhetch_server.pid")" 2>/dev/null || { echo "::error::server exited before healthz"; exit 1; }
            sleep 0.2
          done
          [ "$ready" = "1" ] || { echo "::error::server did not become healthy"; exit 1; }

      # DIAGNOSTIC: measuring actual peak RAM for this target specifically
      # (distinct from fhetch_driver's ~311GB local-replay issue) before we
      # decide on a runner size. Sample free -h every second in the
      # background around the harness call.
      - name: Start memory monitor (background)
        run: |
          ( while true; do date -u +"%H:%M:%S"; free -h; echo "---"; sleep 1; done > "$RUNNER_TEMP/memlog.txt" ) &
          echo $! > "$RUNNER_TEMP/memmon.pid"

      # --opt-level O1: O2+ enables CSE, which is not yet correctness-preserving
      # for the re-recorded replay (see niobium-compiler's ci-release-full.yml
      # FBS round-trip step). Output suppressed: replay() always dispatches
      # over the transport now, so this touches the compiler on every run.
      - name: Run submission — record (hollow) + replay over transport (PASS/FAIL only, compiler output suppressed)
        run: |
          set +x
          export NBCC_FHETCH_SERVER="http://127.0.0.1:$PORT"
          rc=0
          python3 harness/run_submission.py 0 --seed 12345 --target FHE_SIM --opt-level O1 >/dev/null 2>&1 || rc=1
          if [ $rc -eq 0 ]; then
            echo "compiler E2E: PASS"
          else
            echo "::error::compiler E2E FAILED (output suppressed by policy; reproduce locally)"
          fi
          exit $rc

      - name: Stop memory monitor and show log
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/memmon.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/memmon.pid")" 2>/dev/null || true
          fi
          tail -200 "$RUNNER_TEMP/memlog.txt" || true

      - name: Stop the transport server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/fhetch_server.pid" ]; then
            pid="$(cat "$RUNNER_TEMP/fhetch_server.pid")"
            kill -TERM "$pid" 2>/dev/null || true
            for i in 1 2 3 4 5; do kill -0 "$pid" 2>/dev/null || break; sleep 1; done
            kill -0 "$pid" 2>/dev/null && kill -KILL "$pid" 2>/dev/null || true
          fi
